<div class="min-h-screen bg-gray-100 py-8 px-4">
  <div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 poppins-semibold">
          Update Profile
        </h1>
        <p class="text-sm text-gray-600 poppins-regular mt-1">
          Manage your personal information
        </p>
      </div>
      <button
        (click)="goBack()"
        class="px-4 py-2 text-sm text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 poppins-regular flex items-center gap-2"
      >
        <i class="pi pi-arrow-left"></i>
        Back to Portal
      </button>
    </div>

    <!-- Profile Form -->
    <div class="bg-white rounded-lg shadow-md p-6">
      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <div class="space-y-6">
          <!-- Personal Information -->
          <div>
            <h3 class="text-lg font-medium text-gray-900 poppins-medium mb-4">
              Personal Information
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label
                  class="block text-sm font-medium text-gray-700 poppins-regular mb-2"
                >
                  First Name <span class="text-red-500">*</span>
                </label>
                <input
                  type="text"
                  formControlName="first_name"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="Enter first name"
                />
                <div
                  *ngIf="
                    profileForm.get('first_name')?.invalid &&
                    profileForm.get('first_name')?.touched
                  "
                  class="text-red-500 text-xs mt-1"
                >
                  First name is required
                </div>
              </div>

              <div>
                <label
                  class="block text-sm font-medium text-gray-700 poppins-regular mb-2"
                >
                  Last Name <span class="text-red-500">*</span>
                </label>
                <input
                  type="text"
                  formControlName="last_name"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="Enter last name"
                />
                <div
                  *ngIf="
                    profileForm.get('last_name')?.invalid &&
                    profileForm.get('last_name')?.touched
                  "
                  class="text-red-500 text-xs mt-1"
                >
                  Last name is required
                </div>
              </div>
            </div>
          </div>

          <!-- Contact Information -->
          <div>
            <h3 class="text-lg font-medium text-gray-900 poppins-medium mb-4">
              Contact Information
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label
                  class="block text-sm font-medium text-gray-700 poppins-regular mb-2"
                >
                  Email Address <span class="text-red-500">*</span>
                </label>
                <input
                  type="email"
                  formControlName="email"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="email@example.com"
                />
                <div
                  *ngIf="
                    profileForm.get('email')?.invalid &&
                    profileForm.get('email')?.touched
                  "
                  class="text-red-500 text-xs mt-1"
                >
                  Valid email is required
                </div>
              </div>

              <div>
                <label
                  class="block text-sm font-medium text-gray-700 poppins-regular mb-2"
                >
                  Position Title
                </label>
                <input
                  type="text"
                  formControlName="position_title"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="e.g., Job Placement Officer"
                />
              </div>
            </div>
          </div>

          <!-- Submit Button -->
          <div
            class="flex items-center justify-end gap-3 pt-4 border-t border-gray-200"
          >
            <button
              type="button"
              (click)="goBack()"
              class="px-6 py-2 text-sm text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 poppins-regular"
            >
              Cancel
            </button>
            <button
              type="submit"
              [disabled]="loading || profileForm.invalid"
              class="px-6 py-2 text-sm text-white bg-blue-600 rounded-md hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed poppins-medium"
            >
              <span *ngIf="!loading">Save Changes</span>
              <span *ngIf="loading">Saving...</span>
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Additional Info -->
    <div class="mt-6 bg-blue-50 border border-blue-200 rounded-lg p-4">
      <div class="flex items-start gap-3">
        <i class="pi pi-info-circle text-blue-600 mt-0.5"></i>
        <div class="text-sm text-blue-800 poppins-regular">
          <p class="font-medium mb-1">Note:</p>
          <p>
            Changes to your profile will be reflected immediately across the
            system.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
