<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 py-12 px-4 sm:px-6 lg:px-8"
>
  <div class="max-w-2xl w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl">
    <!-- Header -->
    <div class="text-center">
      <img
        src="assets/img/logo.png"
        alt="BatStateU Logo"
        class="mx-auto h-20 w-auto mb-4"
      />
      <h2 class="text-3xl font-bold text-gray-900 poppins-semibold">
        Alumni Registration
      </h2>
      <p class="mt-2 text-sm text-gray-600 poppins-regular">
        Join the BatStateU ILEAP Alumni Network
      </p>
    </div>

    <!-- Registration Form -->
    <form
      [formGroup]="registerForm"
      (ngSubmit)="onSubmit()"
      class="mt-8 space-y-6"
    >
      <!-- Personal Information -->
      <div class="space-y-4">
        <h3 class="text-lg font-medium text-gray-900 poppins-medium">
          Personal Information
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              First Name <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              formControlName="first_name"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Juan"
            />
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Middle Name
            </label>
            <input
              type="text"
              formControlName="middle_name"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Santos"
            />
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Last Name <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              formControlName="last_name"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Dela Cruz"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Email Address <span class="text-red-500">*</span>
            </label>
            <input
              type="email"
              formControlName="email"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="juan.delacruz@example.com"
            />
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Phone Number
            </label>
            <input
              type="tel"
              formControlName="phone_number"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="09123456789"
            />
          </div>
        </div>
      </div>

      <!-- Academic Information -->
      <div class="space-y-4">
        <h3 class="text-lg font-medium text-gray-900 poppins-medium">
          Academic Information
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              SR Code
            </label>
            <input
              type="text"
              formControlName="sr_code"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="20-12345"
            />
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Program <span class="text-red-500">*</span>
            </label>
            <p-dropdown
              formControlName="program_id"
              [options]="programs"
              placeholder="Select Program"
              [filter]="true"
              filterBy="label"
              styleClass="w-full"
            ></p-dropdown>
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Graduation Year <span class="text-red-500">*</span>
            </label>
            <p-dropdown
              formControlName="graduation_year"
              [options]="graduationYears"
              placeholder="Select Year"
              [filter]="true"
              styleClass="w-full"
            ></p-dropdown>
          </div>
        </div>
      </div>

      <!-- Employment Information -->
      <div class="space-y-4">
        <h3 class="text-lg font-medium text-gray-900 poppins-medium">
          Employment Information (Optional)
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Employment Status
            </label>
            <p-dropdown
              formControlName="current_employment_status"
              [options]="employmentStatuses"
              placeholder="Select Status"
              styleClass="w-full"
            ></p-dropdown>
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Current Company
            </label>
            <input
              type="text"
              formControlName="current_company"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Company Name"
            />
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Current Position
            </label>
            <input
              type="text"
              formControlName="current_position"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Job Title"
            />
          </div>
        </div>

        <div>
          <label
            class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
          >
            LinkedIn Profile URL
          </label>
          <input
            type="url"
            formControlName="linkedin_url"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="https://linkedin.com/in/yourprofile"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-4">
        <h3 class="text-lg font-medium text-gray-900 poppins-medium">
          Account Security
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Password <span class="text-red-500">*</span>
            </label>
            <input
              type="password"
              formControlName="password"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Minimum 6 characters"
            />
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 poppins-regular mb-1"
            >
              Confirm Password <span class="text-red-500">*</span>
            </label>
            <input
              type="password"
              formControlName="confirm_password"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Re-enter password"
            />
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="flex items-center justify-between pt-4">
        <a
          routerLink="/login"
          class="text-sm text-blue-600 hover:text-blue-800 poppins-regular"
        >
          Already have an account? Login
        </a>

        <button
          type="submit"
          [disabled]="loading || registerForm.invalid"
          class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed poppins-medium transition-colors"
        >
          <span *ngIf="!loading">Register</span>
          <span *ngIf="loading">Registering...</span>
        </button>
      </div>
    </form>
  </div>
</div>
