<section class="register-section h-screen overflow-y-auto">
  <div class="flex h-full min-h-screen">
    <div class="register-container w-[40%] p-10 flex items-center">
      <form
        class="w-full space-y-4"
        [formGroup]="registerForm"
        (ngSubmit)="onSubmit()"
        novalidate
      >
        <div class="form-header mb-8">
          <h1 class="poppins-bold text-2xl mb-2">
            Internship Learning Experience, Alumni, and Placement System
          </h1>
          <h3 class="poppins-semibold text-xl text-red-500">
            Batangas State University The NEU
          </h3>
        </div>

        <div class="form-body space-y-4">
          <h3 class="poppins-semibold mb-4">Alumni Registration</h3>

          <!-- Personal Information -->
          <div class="grid grid-cols-3 gap-3">
            <div class="input-group flex flex-col">
              <label for="first_name" class="mb-1 text-sm poppins-medium"
                >First Name *</label
              >
              <input
                type="text"
                id="first_name"
                formControlName="first_name"
                placeholder="First Name"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
              <div
                *ngIf="
                  registerForm.get('first_name')?.invalid &&
                  registerForm.get('first_name')?.touched
                "
                class="text-red-500 text-xs mt-1"
              >
                Required
              </div>
            </div>

            <div class="input-group flex flex-col">
              <label for="middle_name" class="mb-1 text-sm poppins-medium"
                >Middle Name</label
              >
              <input
                type="text"
                id="middle_name"
                formControlName="middle_name"
                placeholder="Middle Name"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
            </div>

            <div class="input-group flex flex-col">
              <label for="last_name" class="mb-1 text-sm poppins-medium"
                >Last Name *</label
              >
              <input
                type="text"
                id="last_name"
                formControlName="last_name"
                placeholder="Last Name"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
              <div
                *ngIf="
                  registerForm.get('last_name')?.invalid &&
                  registerForm.get('last_name')?.touched
                "
                class="text-red-500 text-xs mt-1"
              >
                Required
              </div>
            </div>
          </div>

          <!-- Contact Information -->
          <div class="grid grid-cols-2 gap-3">
            <div class="input-group flex flex-col">
              <label for="email" class="mb-1 text-sm poppins-medium"
                >Email Address *</label
              >
              <input
                type="email"
                id="email"
                formControlName="email"
                placeholder="Email Address"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
              <div
                *ngIf="
                  registerForm.get('email')?.invalid &&
                  registerForm.get('email')?.touched
                "
                class="text-red-500 text-xs mt-1"
              >
                Valid email required
              </div>
            </div>

            <div class="input-group flex flex-col">
              <label for="phone_number" class="mb-1 text-sm poppins-medium"
                >Phone Number</label
              >
              <input
                type="text"
                id="phone_number"
                formControlName="phone_number"
                placeholder="Phone Number"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
            </div>
          </div>

          <!-- Password -->
          <div class="grid grid-cols-2 gap-3">
            <div class="input-group flex flex-col">
              <label for="password" class="mb-1 text-sm poppins-medium"
                >Password *</label
              >
              <input
                type="password"
                id="password"
                formControlName="password"
                placeholder="Password (min 6 characters)"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
              <div
                *ngIf="
                  registerForm.get('password')?.invalid &&
                  registerForm.get('password')?.touched
                "
                class="text-red-500 text-xs mt-1"
              >
                Min 6 characters
              </div>
            </div>

            <div class="input-group flex flex-col">
              <label for="confirm_password" class="mb-1 text-sm poppins-medium"
                >Confirm Password *</label
              >
              <input
                type="password"
                id="confirm_password"
                formControlName="confirm_password"
                placeholder="Confirm Password"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
              <div
                *ngIf="
                  registerForm.get('confirm_password')?.invalid &&
                  registerForm.get('confirm_password')?.touched
                "
                class="text-red-500 text-xs mt-1"
              >
                Required
              </div>
            </div>
          </div>

          <!-- Academic Information -->
          <div class="grid grid-cols-3 gap-3">
            <div class="input-group flex flex-col">
              <label for="sr_code" class="mb-1 text-sm poppins-medium"
                >SR Code</label
              >
              <input
                type="text"
                id="sr_code"
                formControlName="sr_code"
                placeholder="SR Code"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
            </div>

            <div class="input-group flex flex-col">
              <label for="program_id" class="mb-1 text-sm poppins-medium"
                >Program *</label
              >
              <select
                id="program_id"
                formControlName="program_id"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none"
              >
                <option value="">Select Program</option>
                <option
                  *ngFor="let program of programs"
                  [value]="program.value"
                >
                  {{ program.label }}
                </option>
              </select>
              <div
                *ngIf="
                  registerForm.get('program_id')?.invalid &&
                  registerForm.get('program_id')?.touched
                "
                class="text-red-500 text-xs mt-1"
              >
                Required
              </div>
            </div>

            <div class="input-group flex flex-col">
              <label for="graduation_year" class="mb-1 text-sm poppins-medium"
                >Graduation Year *</label
              >
              <select
                id="graduation_year"
                formControlName="graduation_year"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none"
              >
                <option value="">Select Year</option>
                <option
                  *ngFor="let year of graduationYears"
                  [value]="year.value"
                >
                  {{ year.label }}
                </option>
              </select>
              <div
                *ngIf="
                  registerForm.get('graduation_year')?.invalid &&
                  registerForm.get('graduation_year')?.touched
                "
                class="text-red-500 text-xs mt-1"
              >
                Required
              </div>
            </div>
          </div>

          <!-- Employment Information -->
          <div class="grid grid-cols-3 gap-3">
            <div class="input-group flex flex-col">
              <label
                for="current_employment_status"
                class="mb-1 text-sm poppins-medium"
                >Employment Status</label
              >
              <select
                id="current_employment_status"
                formControlName="current_employment_status"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none"
              >
                <option value="unemployed">Unemployed</option>
                <option value="employed">Employed</option>
                <option value="self-employed">Self-Employed</option>
              </select>
            </div>

            <div class="input-group flex flex-col">
              <label for="current_company" class="mb-1 text-sm poppins-medium"
                >Current Company</label
              >
              <input
                type="text"
                id="current_company"
                formControlName="current_company"
                placeholder="Current Company"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
            </div>

            <div class="input-group flex flex-col">
              <label for="current_position" class="mb-1 text-sm poppins-medium"
                >Current Position</label
              >
              <input
                type="text"
                id="current_position"
                formControlName="current_position"
                placeholder="Current Position"
                class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
              />
            </div>
          </div>

          <!-- LinkedIn URL -->
          <div class="input-group flex flex-col">
            <label for="linkedin_url" class="mb-1 text-sm poppins-medium"
              >LinkedIn URL</label
            >
            <input
              type="text"
              id="linkedin_url"
              formControlName="linkedin_url"
              placeholder="https://linkedin.com/in/yourprofile"
              class="border px-3 py-2 rounded-sm text-sm poppins-regular outline-none placeholder:text-gray-500"
            />
          </div>

          <button
            type="submit"
            class="mt-3 bg-green-500 hover:bg-green-600 transition-colors duration-300 text-white py-2 rounded-sm w-full poppins-semibold cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="registerForm.invalid || loading"
          >
            <span *ngIf="loading" class="mr-2">
              <i class="pi pi-spinner pi-spin"></i>
            </span>
            <span>{{ loading ? "Registering..." : "Register" }}</span>
          </button>

          <!-- Login Link -->
          <div class="mt-4 text-center">
            <p class="text-sm text-gray-600 poppins-regular">
              Already have an account?
              <a
                routerLink="/login"
                class="text-blue-600 hover:text-blue-800 font-medium underline cursor-pointer"
              >
                Login here
              </a>
            </p>
          </div>
        </div>
      </form>
    </div>

    <div
      class="register-cover relative h-full w-[60%] bg-cover bg-center bg-no-repeat flex justify-center items-center"
      style="background-image: url(&quot;assets/img/login-cover.jpg&quot;)"
    >
      <div class="absolute inset-0 bg-black/50 z-0"></div>
      <img src="assets/img/logo.png" alt="logo" class="relative z-10 w-80" />
    </div>
  </div>
</section>
