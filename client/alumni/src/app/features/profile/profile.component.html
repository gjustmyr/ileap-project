<div class="p-4">
  <!-- Title -->
  <div class="mb-4">
    <h1 class="text-2xl font-bold text-gray-800 poppins-semibold">
      My Profile
    </h1>
    <p class="text-sm text-gray-500 poppins-regular mt-1">
      Manage your personal information and employment details
    </p>
  </div>

  <div class="bg-white border border-gray-200 rounded-md p-6">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <!-- Personal Information -->
      <div class="mb-6">
        <h3 class="text-lg font-semibold mb-4 text-gray-700 poppins-semibold">
          Personal Information
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >First Name *</label
            >
            <input
              type="text"
              formControlName="first_name"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
              [class.border-red-500]="
                profileForm.get('first_name')?.invalid &&
                profileForm.get('first_name')?.touched
              "
            />
          </div>
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Middle Name</label
            >
            <input
              type="text"
              formControlName="middle_name"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
            />
          </div>
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Last Name *</label
            >
            <input
              type="text"
              formControlName="last_name"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
              [class.border-red-500]="
                profileForm.get('last_name')?.invalid &&
                profileForm.get('last_name')?.touched
              "
            />
          </div>
        </div>
      </div>

      <!-- Contact Information -->
      <div class="mb-6">
        <h3 class="text-lg font-semibold mb-4 text-gray-700 poppins-semibold">
          Contact Information
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Email</label
            >
            <input
              type="email"
              formControlName="email"
              class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100 poppins-regular"
              readonly
            />
          </div>
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Phone Number</label
            >
            <input
              type="text"
              formControlName="phone_number"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
            />
          </div>
        </div>
      </div>

      <!-- Academic Information -->
      <div class="mb-6">
        <h3 class="text-lg font-semibold mb-4 text-gray-700 poppins-semibold">
          Academic Information
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >SR Code</label
            >
            <input
              type="text"
              formControlName="sr_code"
              class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100 poppins-regular"
              readonly
            />
          </div>
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Program</label
            >
            <select
              formControlName="program_id"
              class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100 poppins-regular"
              [disabled]="true"
            >
              <option value="">Select Program</option>
              <option *ngFor="let program of programs" [value]="program.value">
                {{ program.label }}
              </option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Graduation Year</label
            >
            <input
              type="number"
              formControlName="graduation_year"
              class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100 poppins-regular"
              readonly
            />
          </div>
        </div>
      </div>

      <!-- Employment Information -->
      <div class="mb-6">
        <h3 class="text-lg font-semibold mb-4 text-gray-700 poppins-semibold">
          Employment Information
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Employment Status</label
            >
            <select
              formControlName="current_employment_status"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
            >
              <option
                *ngFor="let status of employmentStatuses"
                [value]="status.value"
              >
                {{ status.label }}
              </option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Current Company</label
            >
            <input
              type="text"
              formControlName="current_company"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
            />
          </div>
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Current Position</label
            >
            <input
              type="text"
              formControlName="current_position"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
            />
          </div>
        </div>
      </div>

      <!-- Additional Information -->
      <div class="mb-6">
        <h3 class="text-lg font-semibold mb-4 text-gray-700 poppins-semibold">
          Additional Information
        </h3>
        <div class="grid grid-cols-1 gap-4">
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >LinkedIn URL</label
            >
            <input
              type="text"
              formControlName="linkedin_url"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
              placeholder="https://linkedin.com/in/yourprofile"
            />
          </div>
          <div>
            <label class="block text-sm font-medium mb-2 poppins-medium"
              >Resume</label
            >
            <input
              type="file"
              (change)="onFileSelect($event)"
              accept=".pdf,.doc,.docx"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
            />
            <small class="text-gray-500 text-xs poppins-regular"
              >Accepted formats: PDF, DOC, DOCX (Max 5MB)</small
            >
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex justify-end gap-3">
        <button
          type="submit"
          [disabled]="profileForm.invalid || loading"
          class="px-6 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed poppins-medium"
        >
          <i class="pi pi-spin pi-spinner" *ngIf="loading"></i>
          <i class="pi pi-save" *ngIf="!loading"></i>
          {{ loading ? "Saving..." : "Save Changes" }}
        </button>
      </div>
    </form>
  </div>
</div>
