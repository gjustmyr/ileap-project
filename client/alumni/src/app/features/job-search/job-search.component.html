<div class="p-4">
  <!-- Title -->
  <div class="mb-4">
    <h1 class="text-2xl font-bold text-gray-800 poppins-semibold">
      Job Listings
    </h1>
    <p class="text-sm text-gray-500 poppins-regular mt-1">
      Browse and apply for approved job postings
    </p>
  </div>

  <!-- Search Bar -->
  <div class="mb-4">
    <div class="flex gap-2">
      <input
        type="text"
        [(ngModel)]="searchQuery"
        (input)="searchJobs()"
        placeholder="Search jobs by title, company, or description..."
        class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
      />
      <button
        (click)="searchJobs()"
        class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors flex items-center gap-2"
      >
        <i class="pi pi-search"></i>
        Search
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="text-center py-12">
    <i class="pi pi-spin pi-spinner text-4xl text-blue-600"></i>
    <p class="mt-4 text-gray-600">Loading jobs...</p>
  </div>

  <!-- No Jobs -->
  <div
    *ngIf="!loading && filteredJobs.length === 0"
    class="text-center py-12 bg-white border border-gray-200 rounded-md"
  >
    <i class="pi pi-inbox text-6xl text-gray-400"></i>
    <p class="mt-4 text-gray-600">No jobs available at the moment</p>
  </div>

  <!-- Job Cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div
      *ngFor="let job of filteredJobs"
      class="bg-white border border-gray-200 rounded-md hover:shadow-lg transition-shadow"
    >
      <div class="p-4">
        <div class="flex items-start justify-between mb-3">
          <div class="flex-1">
            <h3 class="text-lg font-semibold text-gray-900 poppins-semibold">
              {{ job.title }}
            </h3>
            <p class="text-sm text-gray-600 poppins-regular">
              {{ job.company_name }}
            </p>
          </div>
          <span
            class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs poppins-medium"
            >Open</span
          >
        </div>

        <p class="text-sm text-gray-700 mb-4 line-clamp-3 poppins-regular">
          {{ job.full_description }}
        </p>

        <div
          class="flex items-center justify-between pt-3 border-t border-gray-200"
        >
          <span class="text-xs text-gray-500 flex items-center gap-1">
            <i class="pi pi-calendar"></i>
            {{ job.created_at | date: "MMM d, yyyy" }}
          </span>
          <button
            (click)="openApplyDialog(job)"
            class="px-4 py-1.5 bg-green-600 text-white text-sm rounded hover:bg-green-700 transition-colors flex items-center gap-2"
          >
            <i class="pi pi-send text-xs"></i>
            Apply
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Apply Dialog -->
<div
  *ngIf="showApplyDialog"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
  (click)="closeApplyDialog()"
>
  <div
    class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4"
    (click)="$event.stopPropagation()"
  >
    <div class="px-6 py-4 border-b border-gray-200">
      <h2 class="text-xl font-semibold text-gray-800 poppins-semibold">
        Apply for Job
      </h2>
    </div>

    <div class="p-6" *ngIf="selectedJob">
      <h3 class="text-lg font-semibold mb-1 poppins-semibold">
        {{ selectedJob.title }}
      </h3>
      <p class="text-gray-600 mb-4 poppins-regular">
        {{ selectedJob.company_name }}
      </p>

      <div class="mb-4">
        <label
          class="block text-sm font-medium text-gray-700 mb-2 poppins-medium"
          >Cover Letter *</label
        >
        <textarea
          [(ngModel)]="coverLetter"
          rows="8"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 poppins-regular"
          placeholder="Explain why you're a great fit for this position..."
        ></textarea>
      </div>

      <div class="flex justify-end gap-3">
        <button
          (click)="closeApplyDialog()"
          class="px-4 py-2 text-gray-700 border border-gray-300 rounded hover:bg-gray-50 transition-colors poppins-medium"
        >
          Cancel
        </button>
        <button
          (click)="applyForJob()"
          [disabled]="applying || !coverLetter.trim()"
          class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed poppins-medium"
        >
          <i class="pi pi-spin pi-spinner" *ngIf="applying"></i>
          <i class="pi pi-send" *ngIf="!applying"></i>
          {{ applying ? "Submitting..." : "Submit Application" }}
        </button>
      </div>
    </div>
  </div>
</div>
