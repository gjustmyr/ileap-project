<div class="flex px-20 bg-gray-100 h-full">
  <div class="flex flex-col flex-1">
    <app-header></app-header>

    <div class="flex-1 bg-white">
      <div class="border-b border-gray-200">
        <div class="flex items-center justify-between px-4 py-2 bg-gray-50 border-b border-gray-200">
          <!-- Current Date and Time -->
          <div class="flex items-center gap-2 text-sm text-gray-600 poppins-regular">
            <i class="pi pi-clock text-blue-500"></i>
            <span>{{ currentDateTime }}</span>
          </div>
          
          <!-- User Dropdown -->
          <div class="relative">
            <!-- User Dropdown Trigger -->
            <button
              (click)="toggleUserDropdown()"
              class="flex items-center gap-2 px-3 py-1.5 rounded hover:bg-gray-100 transition-colors cursor-pointer"
            >
              <i class="pi pi-user text-red-500"></i>
              <span class="text-sm text-gray-700 poppins-medium">{{ userName }}</span>
              <i class="pi pi-chevron-down text-xs text-gray-600"></i>
            </button>

            <!-- Dropdown Menu -->
            <div
              *ngIf="isUserDropdownOpen"
              class="absolute right-0 top-10 bg-white rounded shadow-lg border border-gray-200 w-64 z-50"
            >
              <!-- User Info -->
              <div class="px-4 py-3 border-b border-gray-200">
                <div class="text-xs text-gray-500 poppins-regular">Logged in as</div>
                <div class="text-sm text-gray-700 poppins-medium mt-1">
                  {{ userName }}
                </div>
              </div>

              <!-- Menu Items -->
              <div class="py-1">
                <button
                  class="w-full px-4 py-2 text-left text-sm text-gray-700 hover:bg-gray-100 poppins-regular flex items-center gap-2 cursor-pointer"
                  disabled
                  title="Coming soon"
                >
                  <i class="pi pi-cog text-gray-400"></i>
                  <span class="text-gray-400">Settings</span>
                </button>
                <button
                  (click)="logout()"
                  class="w-full px-4 py-2 text-left text-sm text-red-600 hover:bg-red-50 poppins-regular flex items-center gap-2 cursor-pointer"
                >
                  <i class="pi pi-sign-out"></i>
                  <span>Logout</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        
        <nav class="flex gap-4">
          <button
            (click)="activeTab = 0"
            [class.border-b-2]="activeTab === 0"
            [class.border-green-500]="activeTab === 0"
            [class.text-green-600]="activeTab === 0"
            class="px-4 py-3 text-sm poppins-medium hover:text-green-600 transition-colors flex items-center gap-2 cursor-pointer"
          >
            <i class="pi pi-users"></i>
            Students & Attendance
          </button>
          <button
            (click)="activeTab = 1"
            [class.border-b-2]="activeTab === 1"
            [class.border-green-500]="activeTab === 1"
            [class.text-green-600]="activeTab === 1"
            class="px-4 py-3 text-sm poppins-medium hover:text-green-600 transition-colors flex items-center gap-2 cursor-pointer"
          >
            <i class="pi pi-star"></i>
            Performance Appraisal
          </button>
          <button
            (click)="activeTab = 2"
            [class.border-b-2]="activeTab === 2"
            [class.border-green-500]="activeTab === 2"
            [class.text-green-600]="activeTab === 2"
            class="px-4 py-3 text-sm poppins-medium hover:text-green-600 transition-colors flex items-center gap-2 cursor-pointer"
          >
            <i class="pi pi-user"></i>
            Profile
          </button>
        </nav>
      </div>

      <!-- Tab Content -->
      <div class="flex-1 overflow-auto p-4">

      <div [hidden]="activeTab !== 0">
        <app-attendance></app-attendance>
      </div>

      <div [hidden]="activeTab !== 1">
        <app-requirements></app-requirements>
      </div>

      <div [hidden]="activeTab !== 2">
        <app-profile></app-profile>
      </div>
    </div>
  </div>
</div>
