<div
  *ngIf="show"
  class="fixed inset-0 flex items-center justify-center z-50"
  (click)="close()"
>
  <div
    class="bg-white rounded-lg shadow-2xl w-full max-w-5xl mx-4 max-h-[90vh] overflow-hidden flex flex-col border-2 border-gray-300"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="flex justify-between items-center p-4 border-b bg-gray-50">
      <div>
        <h3 class="text-lg font-semibold poppins-medium text-gray-800">
          File Preview
        </h3>
        <p class="text-sm text-gray-600 poppins-regular mt-1">
          {{ fileName }}
        </p>
      </div>
      <button
        type="button"
        (click)="close()"
        class="text-gray-400 hover:text-gray-600 transition"
      >
        <i class="pi pi-times text-xl"></i>
      </button>
    </div>

    <!-- Preview Content -->
    <div class="flex-1 overflow-auto p-4 bg-gray-50">
      <div class="bg-white rounded shadow-sm h-full">
        <!-- PDF Preview -->
        <iframe
          *ngIf="isPdf() && fileUrl"
          [src]="getSafeUrl(fileUrl)"
          class="w-full h-full min-h-[600px] border-0"
          frameborder="0"
        ></iframe>

        <!-- Image Preview -->
        <div
          *ngIf="isImage() && fileUrl"
          class="flex items-center justify-center h-full min-h-[600px] p-4"
        >
          <img
            [src]="fileUrl"
            [alt]="fileName"
            class="max-w-full max-h-full object-contain"
          />
        </div>

        <!-- DOC/DOCX Preview (using Google Docs Viewer) -->
        <iframe
          *ngIf="isDoc() && fileUrl"
          [src]="getGoogleDocsViewerUrl()"
          class="w-full h-full min-h-[600px] border-0"
          frameborder="0"
        ></iframe>

        <!-- No Preview Available -->
        <div
          *ngIf="!fileUrl"
          class="flex items-center justify-center h-full min-h-[600px] text-gray-500"
        >
          <div class="text-center">
            <i class="pi pi-file text-6xl mb-4 text-gray-300"></i>
            <p>No file available for preview</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-2 p-4 border-t bg-gray-50">
      <button
        type="button"
        (click)="close()"
        class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-100 text-sm poppins-medium transition"
      >
        Close
      </button>
      <a
        *ngIf="fileUrl"
        [href]="fileUrl"
        download
        class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 text-sm poppins-medium transition inline-flex items-center gap-2"
      >
        <i class="pi pi-download"></i>
        Download
      </a>
    </div>
  </div>
</div>
