# ILEAP System Nginx Configuration
# Copy this to: /etc/nginx/sites-available/ileap

# Upstream for FastAPI backend
upstream fastapi_backend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Uncomment after SSL setup to redirect to HTTPS
    # return 301 https://$server_name$request_uri;
    
    # Root directory
    root /var/www/html;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
    
    # Backend API
    location /api {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for file uploads
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }
    
    # File uploads - served directly by Nginx
    location /uploads {
        alias /var/www/html/uploads;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Superadmin Portal
    location /superadmin {
        alias /var/www/html/superadmin;
        try_files $uri $uri/ /superadmin/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # OJT Head Portal
    location /ojt-head {
        alias /var/www/html/ojt-head;
        try_files $uri $uri/ /ojt-head/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # OJT Coordinator Portal
    location /ojt-coordinator {
        alias /var/www/html/ojt-coordinator;
        try_files $uri $uri/ /ojt-coordinator/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Student Portal
    location /student {
        alias /var/www/html/student;
        try_files $uri $uri/ /student/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Employer Portal
    location /employer {
        alias /var/www/html/employer;
        try_files $uri $uri/ /employer/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Supervisor Portal
    location /supervisor {
        alias /var/www/html/supervisor;
        try_files $uri $uri/ /supervisor/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Job Placement Head Portal
    location /jp-head {
        alias /var/www/html/jp-head;
        try_files $uri $uri/ /jp-head/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Alumni Portal
    location /alumni {
        alias /var/www/html/alumni;
        try_files $uri $uri/ /alumni/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Default location - redirect to appropriate portal
    location = / {
        return 302 /superadmin;
    }
    
    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
