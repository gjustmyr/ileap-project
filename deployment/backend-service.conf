# ILEAP Backend Systemd Service
# Copy this to: /etc/systemd/system/ileap-backend.service

[Unit]
Description=ILEAP FastAPI Backend
After=network.target postgresql.service

[Service]
Type=simple
User=ubuntu
Group=ubuntu
WorkingDirectory=/home/ubuntu/ileap-project/server-fastapi
Environment="PATH=/home/ubuntu/ileap-project/server-fastapi/venv/bin"
ExecStart=/home/ubuntu/ileap-project/server-fastapi/venv/bin/uvicorn main:app --host 0.0.0.0 --port 3000 --workers 4
Restart=always
RestartSec=10

[Install]
WantedBy=multi-user.target
