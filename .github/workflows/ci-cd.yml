name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20.x"
  PYTHON_VERSION: "3.11"

jobs:
  # Backend Tests and Build
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        working-directory: ./server-fastapi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        working-directory: ./server-fastapi
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests (if tests exist)
        working-directory: ./server-fastapi
        run: |
          if [ -d "tests" ]; then
            pytest --cov=. --cov-report=xml
          else
            echo "No tests directory found, skipping tests"
          fi

  # Frontend Build - Super Admin
  frontend-superadmin:
    name: Build Super Admin Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/superadmin/package-lock.json

      - name: Install dependencies
        working-directory: ./client/superadmin
        run: npm ci

      - name: Build
        working-directory: ./client/superadmin
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: superadmin-dist
          path: client/superadmin/dist
          retention-days: 7

  # Frontend Build - OJT Head
  frontend-ojt-head:
    name: Build OJT Head Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/ojt-head/package-lock.json

      - name: Install dependencies
        working-directory: ./client/ojt-head
        run: npm ci

      - name: Build
        working-directory: ./client/ojt-head
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ojt-head-dist
          path: client/ojt-head/dist
          retention-days: 7

  # Frontend Build - OJT Coordinator
  frontend-ojt-coordinator:
    name: Build OJT Coordinator Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/ojt-coordinator/package-lock.json

      - name: Install dependencies
        working-directory: ./client/ojt-coordinator
        run: npm ci

      - name: Build
        working-directory: ./client/ojt-coordinator
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ojt-coordinator-dist
          path: client/ojt-coordinator/dist
          retention-days: 7

  # Frontend Build - Student Trainee
  frontend-student-trainee:
    name: Build Student Trainee Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/student-trainee/package-lock.json

      - name: Install dependencies
        working-directory: ./client/student-trainee
        run: npm ci

      - name: Build
        working-directory: ./client/student-trainee
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: student-trainee-dist
          path: client/student-trainee/dist
          retention-days: 7

  # Frontend Build - Employer
  frontend-employer:
    name: Build Employer Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/employer/package-lock.json

      - name: Install dependencies
        working-directory: ./client/employer
        run: npm ci

      - name: Build
        working-directory: ./client/employer
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: employer-dist
          path: client/employer/dist
          retention-days: 7

  # Frontend Build - Supervisor
  frontend-supervisor:
    name: Build Supervisor Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/supervisor/package-lock.json

      - name: Install dependencies
        working-directory: ./client/supervisor
        run: npm ci

      - name: Build
        working-directory: ./client/supervisor
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supervisor-dist
          path: client/supervisor/dist
          retention-days: 7

  # Deploy to Production (only on main branch)
  deploy:
    name: Deploy to Production
    needs:
      [
        backend,
        frontend-superadmin,
        frontend-ojt-head,
        frontend-ojt-coordinator,
        frontend-student-trainee,
        frontend-employer,
        frontend-supervisor,
      ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Navigate to project directory
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            git pull origin main

            # Backend deployment
            cd server-fastapi
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart fastapi

            # Frontend deployment (copy built files to nginx)
            sudo cp -r ../client/*/dist/* /var/www/html/
            sudo systemctl reload nginx

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment completed with status: ${{ job.status }}"
