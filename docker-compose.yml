version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ileap-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ileap_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ileap-network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./server-fastapi
      dockerfile: Dockerfile
    container_name: ileap-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ileap_db}
      SECRET_KEY: ${SECRET_KEY}
      API_PORT: 3000
    volumes:
      - ./server-fastapi/uploads:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - ileap-network
    restart: unless-stopped

  # Super Admin Frontend
  superadmin:
    build:
      context: ./client/superadmin
      dockerfile: Dockerfile
    container_name: ileap-superadmin
    ports:
      - "4200:80"
    networks:
      - ileap-network
    restart: unless-stopped

  # OJT Head Frontend
  ojt-head:
    build:
      context: ./client/ojt-head
      dockerfile: Dockerfile
    container_name: ileap-ojt-head
    ports:
      - "4201:80"
    networks:
      - ileap-network
    restart: unless-stopped

  # OJT Coordinator Frontend
  ojt-coordinator:
    build:
      context: ./client/ojt-coordinator
      dockerfile: Dockerfile
    container_name: ileap-ojt-coordinator
    ports:
      - "4202:80"
    networks:
      - ileap-network
    restart: unless-stopped

  # Student Trainee Frontend
  student-trainee:
    build:
      context: ./client/student-trainee
      dockerfile: Dockerfile
    container_name: ileap-student-trainee
    ports:
      - "4203:80"
    networks:
      - ileap-network
    restart: unless-stopped

  # Employer Frontend
  employer:
    build:
      context: ./client/employer
      dockerfile: Dockerfile
    container_name: ileap-employer
    ports:
      - "4204:80"
    networks:
      - ileap-network
    restart: unless-stopped

  # Supervisor Frontend
  supervisor:
    build:
      context: ./client/supervisor
      dockerfile: Dockerfile
    container_name: ileap-supervisor
    ports:
      - "4205:80"
    networks:
      - ileap-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ileap-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - superadmin
      - ojt-head
      - ojt-coordinator
      - student-trainee
      - employer
      - supervisor
    networks:
      - ileap-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ileap-network:
    driver: bridge
